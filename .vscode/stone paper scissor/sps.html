<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stone Paper Scissor</title>
    <link rel="stylesheet" href="sps.css"
</head>
<h1>Rock Paper Scissor</h1>
<body>
    <main>

        <div class="choices">
        
            <div class="choice" id="paper">
                <img src="./image/paper.png" />

            </div>
            <div class="choice" id="rock">
                <img src="./image/rock.png" />

            </div>
            <div class="choice" id="scissor">
                <img src="./image/scissors.jpg" />
            </div>
        </div>
        <div class="Score">
            <div class="userScore">
                <p id="user">0</p>
                <p>You</p>
            </div>
            <div class="compScore">
                <p id="comp">0</p>
                <p>Comp</p>
            </div>
        </div>


         <div class="msg-container" >
            <p class="msg"> Play the game </p>
        </div>
    </main>
    <script src="sps.js"></script>
</body>
</html>
